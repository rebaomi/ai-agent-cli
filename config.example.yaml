# AI Agent CLI 配置说明

## 多模型支持

coolAI 支持多种大模型提供商：
- **Ollama** (本地)
- **DeepSeek** 
- **Kimi** (月之暗面)
- **GLM** (智谱)
- **Doubao** (字节豆包)
- **MiniMax** (稀宇)
- **OpenAI** (GPT)
- **Claude** (Anthropic)
- **Gemini** (Google)

## 配置示例

### Ollama 配置 (必须，本地模型)
```yaml
llm:
  default: ollama
  providers:
    ollama:
      enabled: true
      baseUrl: http://localhost:11434
      model: qwen3.5:9b
      temperature: 0.7
```

### DeepSeek 配置
```yaml
llm:
  providers:
    deepseek:
      enabled: true
      apiKey: your-deepseek-api-key
      baseUrl: https://api.deepseek.com
      model: deepseek-chat
      temperature: 0.7
```

