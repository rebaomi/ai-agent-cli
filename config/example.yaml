# coolAI 配置文件示例
# 复制到 ~/.ai-agent-cli/config.yaml

ollama:
  baseUrl: http://localhost:11434
  model: qwen3.5:9b
  temperature: 0.7
  maxTokens: 4096

workspace: .
maxIterations: 100
toolTimeout: 60000

sandbox:
  enabled: true
  timeout: 30000
  allowedPaths:
    - .
    - ~/projects
    - ~/code
  deniedPaths:
    - /etc
    - /sys
    - /root
    - C:\Windows
    - C:\Program Files

