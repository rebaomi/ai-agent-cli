# coolAI 配置文件示例
# 复制到 ~/.ai-agent-cli/config.yaml

# ===========================================
# 默认模型（必须配置一个）
# ===========================================
defaultProvider: ollama

# Agent 交互模式：auto=默认无感切换，chat=偏连续对话，task=偏任务完成/工作流执行
agentInteractionMode: auto

# Ollama（本地模型）
ollama:
  enabled: true
  baseUrl: http://localhost:11434
  model: qwen3.5:9b
  temperature: 0.7
  maxTokens: 4096

# DeepSeek（云端模型）
deepseek:
  enabled: false
  apiKey: sk-your-deepseek-api-key
  model: deepseek-chat
  reasoningModel: deepseek-reasoner
  baseUrl: https://api.deepseek.com
  temperature: 0.7
  maxTokens: 4096
  autoReasoning:
    enabled: false
    simpleTaskMaxChars: 120
    simpleConversationMaxChars: 8000
    preferReasonerForToolMessages: true
    preferReasonerForPlanning: true
    preferReasonerForLongContext: true

# Kimi（月之暗面）
kimi:
  enabled: false
  apiKey: your-kimi-api-key
  model: moonshot-v1-8k
  baseUrl: https://api.moonshot.cn/v1
  temperature: 0.7

# 智谱 GLM
glm:
  enabled: false
  apiKey: your-glm-api-key
  model: glm-4
  baseUrl: https://open.bigmodel.cn/api/paas/v4
  temperature: 0.7

# 字节豆包
doubao:
  enabled: false
  apiKey: your-doubao-api-key
  model: doubao-pro
  baseUrl: https://ark.cn-beijing.volces.com/api/v3
  temperature: 0.7

# MiniMax
minimax:
  enabled: false
  apiKey: your-minimax-api-key
  model: MiniMax-Text-01
  baseUrl: https://api.minimax.chat/v1
  temperature: 0.7

# OpenAI
openai:
  enabled: false
  apiKey: your-openai-api-key
  model: gpt-4
  baseUrl: https://api.openai.com/v1
  temperature: 0.7

# Anthropic Claude
claude:
  enabled: false
  apiKey: your-claude-api-key
  model: claude-sonnet-4-20250514
  baseUrl: https://api.anthropic.com
  temperature: 0.7

# Google Gemini
gemini:
  enabled: false
  apiKey: your-gemini-api-key
  model: gemini-2.0-flash
  baseUrl: https://generativelanguage.googleapis.com/v1beta
  temperature: 0.7

# 浏览器智能代理
browserAgent:
  enabled: true
  mode: smart
  browser: chrome
  headless: true
  timeoutMs: 15000
  # 加载浏览器扩展时会自动切到 persistent context，并强制使用 Playwright Chromium 通道。
  # 推荐搭配 headless: false 使用，例如放 Tampermonkey 解压目录。
  extensionPaths: []
  # userDataDir 可持久化扩展状态、登录态和脚本本地存储。
  # userDataDir: ~/.ai-agent-cli/browser-profile
  initScriptPaths: []
  initScripts: []
  pageScriptPaths: []
  pageScripts: []
  userscripts:
    paths: []
    inline: []
    runAt: document-end
    enabled: true
  workflowDir: browser-workflows
  autoMatchWorkflows: true
  preferredLocalProvider: ollama
  fallbackProvider: default
  ollamaHealthCheckUrl: http://localhost:11434/api/tags
  ollamaHealthCacheMs: 15000
  plannerModel: qwen3.5:7b
  extractorModel: qwen3.5:3b
  visionProvider: default
  # expectResult 不匹配时的处理策略：
  # record-only: 仅记录到 action 输出/日志；warn: 继续执行并显式警告；hard-fail: 立即中断当前运行。
  expectResultMismatchStrategy: warn
  maxSteps: 20
  maxActionsPerPlan: 3
  observe:
    useScreenshotByDefault: false
    forceScreenshotAfterFailures: 2
    fullPageScreenshot: false
    maxDomNodes: 120
    maxTextChars: 4000
  optimization:
    enableStateCache: true
    enableDiffObservation: true
    enableRuleFastPath: true
    enableActionBatching: true
  safety:
    enabled: true
    blockFinancialActions: true
    blockPrivacyActions: true
    blockIllegalActions: true
    allowKeywords:
      global: []
      financial: []
      privacy: []
      illegal: []
    blockKeywords:
      global: []
      financial:
        - confirm payment
      privacy:
        - sms code
      illegal: []
    domainPolicies:
      - name: trusted-order-review
        match:
          - example.com
          - checkout.example.com
        allowKeywords:
          financial:
            - order preview
            - review order
        blockKeywords:
          financial:
            - pay now
            - confirm payment
  debug:
    saveTrace: true
    saveScreenshotsOnFailure: true

# ===========================================
# 基础配置
# ===========================================

workspace: .
maxIterations: 100
maxToolCallsPerTurn: 10
autoContinueOnToolLimit: true
maxContinuationTurns: 3
toolTimeout: 60000

directAction:
  conversationMode:
    enabled: true
    preambleThreshold: 2

# ===========================================
# 通知与飞书 Relay
# ===========================================

notifications:
  lark:
    morningNews:
      chatId: oc_xxx
      schedule: '0 8 * * *'
      timezone: Asia/Shanghai
      saveOutput: true
    weather:
      chatId: oc_xxx
      city: 北京
      timezone: Asia/Shanghai
    relay:
      enabled: false
      autoSubscribe: true
      eventTypes:
        - im.message.receive_v1
      compact: true
      quiet: true
      allowCommands: false
      downloadAttachments: true
      receiveDir: ~/.ai-agent-cli/feishuReceive
      # allowedChatIds:
      #   - oc_xxx
      # allowedSenderIds:
      #   - ou_xxx
      # cliBin: lark-cli.cmd

# 全局产物输出目录（docx/pdf/xlsx/txt/md 等相对输出默认落这里）
# 支持使用“桌面”或“Desktop”别名，例如：artifactOutputDir: 桌面/coolAI
artifactOutputDir: ~/.ai-agent-cli/outputs
# documentOutputDir 可作为兼容别名，未设置 artifactOutputDir 时生效
# documentOutputDir: ~/Documents/coolAI

# ===========================================
# 沙箱配置
# ===========================================

sandbox:
  enabled: true
  timeout: 30000
  allowedPaths:
    - .
    - ~/projects
    - ~/code
  deniedPaths:
    - /etc
    - /sys
    - /root
    - C:\Windows
    - C:\Program Files

