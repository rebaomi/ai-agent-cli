# coolAI 配置文件示例
# 复制到 ~/.ai-agent-cli/config.yaml

# ===========================================
# LLM 配置（至少配置一个）
# ===========================================

# Ollama（本地模型，默认）
ollama:
  baseUrl: http://localhost:11434
  model: qwen3.5:9b
  temperature: 0.7
  maxTokens: 4096

