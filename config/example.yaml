# ===========================================
# 基础配置
# ===========================================

workspace: .
maxIterations: 100
toolTimeout: 60000

# ===========================================
# 沙箱配置
# ===========================================

sandbox:
  enabled: true
  timeout: 30000
  allowedPaths:
    - .
    - ~/projects
    - ~/code
  deniedPaths:
    - /etc
    - /sys
    - /root
    - C:\Windows
    - C:\Program Files

